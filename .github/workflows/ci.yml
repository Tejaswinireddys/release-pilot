name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  DEMO_MODE: "true"
  DEMO_APPROVAL_TOKEN: "ci-approval-token"
  OPENAI_API_KEY: "demo-ci-key"
  OPA_VERSION: "v0.70.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OPA binary
        run: |
          curl -sL -o /usr/local/bin/opa \
            "https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/opa_linux_amd64_static"
          chmod 755 /usr/local/bin/opa
          opa version

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
