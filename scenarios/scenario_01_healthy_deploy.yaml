name: "Scenario 01 — ServiceA Healthy Canary Deploy"
description: >
  Standard canary deployment of ServiceA (PCI-scoped payment processing).
  All SLOs are within bounds. Change record is approved. Deployment is within
  business hours. Expected outcome: PROMOTED after 5 canary steps.

# ── Orchestrator fields ───────────────────────────────────────────────────────
service_id: servicea
pr_number: 101
version: "v3.1.0"

deployment:
  type: canary
  environment: production

change_record:
  id: "CHG-5001"
  status: "Approved"
  approved_by:
    - "alice.nguyen@example.com"
  pci_approvals:
    - "pci-assessor@example.com"
  off_hours_approved: false
  executive_approved: false
  cab_approved: true

freeze:
  active: false

expected_outcome: PROMOTED
expected_steps: 5

